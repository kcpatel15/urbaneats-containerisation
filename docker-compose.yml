version: '3.8'

services:
  web:
    build: ./web
    environment:
      - NODE_ENV=production
      - API_URL=http://api:4000
    depends_on:
      - api
    networks:
      - urbaneats-net

  api:
    build: ./api
    environment:
      - DB_HOST=db
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://cache:6379
    depends_on:
      - db
      - cache
    restart: unless-stopped
    networks:
      - urbaneats-net

  worker:
    build: ./worker
    depends_on:
      - queue
    networks:
      - urbaneats-net
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M

  db:
    image: postgres:15-alpine
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=urbaneats
    networks:
      - urbaneats-net

  cache:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    networks:
      - urbaneats-net

  queue:
    image: rabbitmq:3-management-alpine
    ports:
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}
    networks:
      - urbaneats-net

  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api
    networks:
      - urbaneats-net

volumes:
  db_data:

networks:
  urbaneats-net:
    driver: bridge